<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SINGULARITY GitHub Profile</title>
  <desc id="desc">A dark minimal GitHub profile visual with large typography.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="45%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#030303"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="80" y1="220" x2="1000" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.22"/>
      </feComponentTransfer>
    </filter>
    <filter id="liquid">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.018" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.005 0.014;0.012 0.024;0.005 0.014" dur="9s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G">
        <animate attributeName="scale" values="0;5;2;0" dur="8s" repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sans {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      .serif {
        font-family: Georgia, "Times New Roman", serif;
      }
      .meta {
        fill: rgba(255,255,255,0.42);
        font-size: 14px;
        letter-spacing: 5px;
      }
      .tiny {
        fill: rgba(255,255,255,0.34);
        font-size: 12px;
        letter-spacing: 4px;
      }
      .title {
        fill: url(#textGrad);
        font-size: 156px;
        font-weight: 300;
        letter-spacing: -10px;
      }
      .italic {
        font-style: italic;
      }
      .body {
        fill: rgba(255,255,255,0.62);
        font-size: 22px;
        font-weight: 300;
        letter-spacing: 0.5px;
      }
      .cardTitle {
        fill: rgba(255,255,255,0.9);
        font-size: 34px;
        font-weight: 300;
        letter-spacing: -1px;
      }
      .cardText {
        fill: rgba(255,255,255,0.44);
        font-size: 15px;
        font-weight: 300;
      }
      .line {
        stroke: rgba(255,255,255,0.13);
      }
      .bright {
        stroke: rgba(255,255,255,0.85);
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 0.9; }
      }
      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }
    </style>
  </defs>
  <rect width="1200" height="900" fill="#050505"/>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" filter="url(#grain)" opacity="0.5"/>
  <!-- outer frame -->
  <line x1="70" y1="70" x2="1130" y2="70" class="line"/>
  <line x1="70" y1="830" x2="1130" y2="830" class="line"/>
  <line x1="70" y1="70" x2="70" y2="830" class="line"/>
  <line x1="1130" y1="70" x2="1130" y2="830" class="line"/>
  <!-- left progress -->
  <line x1="38" y1="250" x2="38" y2="650" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="38" y1="250" x2="38" y2="405" class="bright pulse" stroke-width="1"/>
  <!-- top -->
  <text x="90" y="115" class="sans meta">SINGULARITY // PROFILE</text>
  <text x="805" y="115" class="sans tiny">CODE · DESIGN · SYSTEM</text>
  <!-- index -->
  <text x="90" y="210" class="sans meta">01 / ARCHIVE</text>
  <!-- main title -->
  <g filter="url(#liquid)">
    <text x="82" y="370" class="serif title">Ephemeral</text>
    <text x="90" y="520" class="serif title italic">Substance</text>
  </g>
  <!-- description -->
  <text x="95" y="610" class="sans body">
    <tspan x="95" dy="0">在数字荒原中寻找永恒。</tspan>
    <tspan x="95" dy="40">通过代码捕捉转瞬即逝的美学瞬间，</tspan>
    <tspan x="95" dy="40">并将其转化为可感知的现实。</tspan>
  </text>
  <!-- explore -->
  <g transform="translate(95 735)">
    <text x="0" y="0" class="sans meta" font-size="13">EXPLORE</text>
    <line x1="0" y1="26" x2="120" y2="26" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  </g>
  <!-- bottom cards -->
  <g transform="translate(450 680)">
    <text x="0" y="0" class="sans tiny">02 / THEORY</text>
    <text x="0" y="50" class="serif cardTitle">Kinetic Poetry</text>
    <text x="0" y="88" class="sans cardText">Motion is not displacement, but the soul of interface.</text>
  </g>
  <g transform="translate(450 770)">
    <line x1="0" y1="-18" x2="610" y2="-18" class="line"/>
  </g>
  <g transform="translate(780 680)">
    <text x="0" y="0" class="sans tiny">03 / VISION</text>
    <text x="0" y="50" class="serif cardTitle">Absolute Zero</text>
    <text x="0" y="88" class="sans cardText">Minimalism is not absence, but perfect balance.</text>
  </g>
  <!-- status orb -->
  <g transform="translate(990 560)">
    <circle cx="0" cy="0" r="62" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    <circle cx="0" cy="0" r="7" fill="#ffffff" filter="url(#glow)">
      <animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="-46" y="100" class="sans tiny">ONLINE</text>
  </g>
  <!-- footer -->
  <text x="90" y="875" class="sans tiny">EPHEMERAL · KINETIC · ZERO</text>
  <text x="848" y="875" class="sans tiny">GITHUB README VISUAL</text>
</svg>
