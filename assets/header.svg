<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- RV07 文字从黑色到透明的横向向内渐变（从左边向右渐变到透明） -->
    <linearGradient id="rv07Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- CODE 文字从黑色到透明的横向向内渐变（从右边向左渐变到透明） -->
    <linearGradient id="codeGradient" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- RV07 左上角 -->
  <text x="40" y="110" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="90" font-weight="900" fill="url(#rv07Gradient)" letter-spacing="6">RV07</text>
  <!-- CODE 右下角 -->
  <text x="760" y="240" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="90" font-weight="900" fill="url(#codeGradient)" text-anchor="end" letter-spacing="6">CODE</text>
</svg>
