<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
    <filter id="liquid">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.008 0.014;0.016 0.028;0.008 0.014" dur="10s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G">
        <animate attributeName="scale" values="0;4;2;0" dur="8s" repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>
    <radialGradient id="glow" cx="35%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="800" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300');
      .serif { font-family: "Cormorant Garamond", Georgia, serif; }
      .sans  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    </style>
  </defs>
  <!-- ── 背景 ── -->
  <rect width="1200" height="600" fill="#050505"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <rect width="1200" height="600" filter="url(#grain)"/>
  <!-- ── 左侧进度条 ── -->
  <line x1="52" y1="80" x2="52" y2="520" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="52" y1="80" x2="52" y2="280" stroke="rgba(255,255,255,0.7)" stroke-width="1">
    <animate attributeName="y2" values="80;280;200;280" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.6;0.5" dur="5s" repeatCount="indefinite"/>
  </line>
  <circle cx="52" cy="280" r="2.5" fill="white" opacity="0.8">
    <animate attributeName="cy" values="80;280;200;280" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- ── 索引 & 角标 ── -->
  <text x="92"   y="110" class="sans" fill="rgba(255,255,255,0.38)" font-size="12" letter-spacing="4">01 / ARCHIVE</text>
  <text x="1108" y="50"  class="sans" fill="rgba(255,255,255,0.25)" font-size="10" letter-spacing="3" text-anchor="end">SINGULARITY</text>
  <!-- ── 大标题 + 液态滤镜 ── -->
  <g filter="url(#liquid)">
    <text x="88" y="255" class="serif" fill="url(#titleFill)" font-size="120" font-weight="300" letter-spacing="-5">Ephemeral</text>
    <text x="96" y="365" class="serif" fill="url(#titleFill)" font-size="120" font-weight="300" font-style="italic" letter-spacing="-5">Substance</text>
  </g>
  <!-- ── 右侧描述（淡入） ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="1.5s" fill="freeze"/>
    <text x="700" y="195" class="sans" fill="rgba(255,255,255,0.55)" font-size="15" font-weight="300">
      <tspan x="700" dy="0">在数字荒原中寻找永恒。</tspan>
      <tspan x="700" dy="28">通过代码捕捉那些转瞬即逝的美学瞬间，</tspan>
      <tspan x="700" dy="28">并将其转化为可感知的现实。</tspan>
    </text>
    <text x="700" y="310" class="sans" fill="rgba(255,255,255,0.7)" font-size="12" letter-spacing="3">EXPLORE</text>
    <line x1="700" y1="328" x2="790" y2="328" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <!-- ── 分隔线 ── -->
  <line x1="92" y1="440" x2="1108" y2="440" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- ── 底部三栏 ── -->
  <g>
    <text x="92"  y="475" class="sans"  fill="rgba(255,255,255,0.3)"  font-size="10" letter-spacing="3">02 / THEORY</text>
    <text x="92"  y="505" class="serif" fill="rgba(255,255,255,0.8)"  font-size="24" font-weight="300">Kinetic Poetry</text>
    <text x="92"  y="530" class="sans"  fill="rgba(255,255,255,0.38)" font-size="12" font-weight="300">动效是界面的灵魂。</text>
  </g>
  <g>
    <text x="500" y="475" class="sans"  fill="rgba(255,255,255,0.3)"  font-size="10" letter-spacing="3">03 / VISION</text>
    <text x="500" y="505" class="serif" fill="rgba(255,255,255,0.8)"  font-size="24" font-weight="300">Absolute Zero</text>
    <text x="500" y="530" class="sans"  fill="rgba(255,255,255,0.38)" font-size="12" font-weight="300">极简不是缺失，而是完美的平衡。</text>
  </g>
  <!-- 状态指示灯 -->
  <g>
    <circle cx="920" cy="500" r="28" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none"/>
    <circle cx="920" cy="500" r="3.5" fill="rgba(255,255,255,0.85)">
      <animate attributeName="r"       values="2.5;4.5;2.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6"   dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="968" y="495" class="sans" fill="rgba(255,255,255,0.3)" font-size="10" letter-spacing="2">STATUS</text>
    <text x="968" y="515" class="sans" fill="rgba(255,255,255,0.5)" font-size="12">ONLINE · BUILDING</text>
  </g>
  <!-- ── 底部签名 ── -->
  <text x="92"   y="575" class="sans" fill="rgba(255,255,255,0.2)"  font-size="10" letter-spacing="3">CODE · DESIGN · SYSTEM · AESTHETICS</text>
  <text x="1108" y="575" class="sans" fill="rgba(255,255,255,0.15)" font-size="9"  letter-spacing="2" text-anchor="end">© SINGULARITY</text>
</svg>
