<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <!-- RV07 从左实到右透明 -->
    <linearGradient id="rv07Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- CODE 从右实到左透明 -->
    <linearGradient id="codeGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- 几何装饰渐变 -->
    <linearGradient id="geoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="geoGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="geoGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.04"/>
    </linearGradient>
    <!-- 裁切用 -->
    <clipPath id="triClip">
      <polygon points="0,0 220,0 0,220"/>
    </clipPath>
    <clipPath id="triClip2">
      <polygon points="1000,400 780,400 1000,180"/>
    </clipPath>
  </defs>
  <!-- ====== 左上区域几何装饰 ====== -->
  <!-- 大三角背景 -->
  <polygon points="0,0 320,0 0,320" fill="url(#geoGrad1)"/>
  <!-- 内嵌三角线框 -->
  <polygon points="0,0 240,0 0,240" fill="none" stroke="#000000" stroke-opacity="0.08" stroke-width="1.5"/>
  <polygon points="0,0 160,0 0,160" fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>
  <polygon points="0,0 80,0 0,80" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="0.8"/>
  <!-- 对角装饰线 -->
  <line x1="0" y1="180" x2="180" y2="0" stroke="url(#lineGrad1)" stroke-width="1.2"/>
  <line x1="0" y1="260" x2="260" y2="0" stroke="url(#lineGrad1)" stroke-width="0.8"/>
  <!-- 小圆点装饰 -->
  <circle cx="60" cy="170" r="3" fill="url(#dotGrad)"/>
  <circle cx="100" cy="130" r="2.2" fill="url(#dotGrad)"/>
  <circle cx="140" cy="90" r="1.8" fill="url(#dotGrad)"/>
  <circle cx="30" cy="210" r="2.5" fill="url(#dotGrad)"/>
  <!-- 菱形 -->
  <polygon points="190,50 210,70 190,90 170,70" fill="none" stroke="#000000" stroke-opacity="0.09" stroke-width="1.2"/>
  <!-- 小正方形旋转 -->
  <rect x="230" y="15" width="18" height="18" rx="2" fill="none" stroke="#000000" stroke-opacity="0.07" stroke-width="1" transform="rotate(45 239 24)"/>
  <!-- 水平细线 -->
  <line x1="0" y1="155" x2="350" y2="155" stroke="#000000" stroke-opacity="0.04" stroke-width="0.6"/>
  <!-- ====== 右下区域几何装饰 ====== -->
  <!-- 大三角背景 -->
  <polygon points="1000,400 680,400 1000,80" fill="url(#geoGrad2)"/>
  <!-- 内嵌三角线框 -->
  <polygon points="1000,400 760,400 1000,160" fill="none" stroke="#000000" stroke-opacity="0.08" stroke-width="1.5"/>
  <polygon points="1000,400 840,400 1000,240" fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>
  <polygon points="1000,400 920,400 1000,320" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="0.8"/>
  <!-- 对角装饰线 -->
  <line x1="1000" y1="220" x2="820" y2="400" stroke="url(#lineGrad2)" stroke-width="1.2"/>
  <line x1="1000" y1="140" x2="740" y2="400" stroke="url(#lineGrad2)" stroke-width="0.8"/>
  <!-- 小圆点装饰 -->
  <circle cx="940" cy="230" r="3" fill="url(#dotGrad)"/>
  <circle cx="900" cy="270" r="2.2" fill="url(#dotGrad)"/>
  <circle cx="860" cy="310" r="1.8" fill="url(#dotGrad)"/>
  <circle cx="970" cy="190" r="2.5" fill="url(#dotGrad)"/>
  <!-- 菱形 -->
  <polygon points="810,350 830,330 810,310 790,330" fill="none" stroke="#000000" stroke-opacity="0.09" stroke-width="1.2"/>
  <!-- 小正方形旋转 -->
  <rect x="752" y="367" width="18" height="18" rx="2" fill="none" stroke="#000000" stroke-opacity="0.07" stroke-width="1" transform="rotate(45 761 376)"/>
  <!-- 水平细线 -->
  <line x1="1000" y1="245" x2="650" y2="245" stroke="#000000" stroke-opacity="0.04" stroke-width="0.6"/>
  <!-- ====== 中部散落几何 ====== -->
  <!-- 六边形 -->
  <polygon points="500,195 515,185 530,195 530,210 515,220 500,210" fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>
  <!-- 十字 -->
  <line x1="480" y1="200" x2="480" y2="212" stroke="#000000" stroke-opacity="0.05" stroke-width="0.8"/>
  <line x1="474" y1="206" x2="486" y2="206" stroke="#000000" stroke-opacity="0.05" stroke-width="0.8"/>
  <!-- 散落小圆 -->
  <circle cx="420" cy="180" r="1.5" fill="#000000" fill-opacity="0.05"/>
  <circle cx="580" cy="220" r="1.5" fill="#000000" fill-opacity="0.05"/>
  <circle cx="350" cy="250" r="1" fill="#000000" fill-opacity="0.04"/>
  <circle cx="650" cy="150" r="1" fill="#000000" fill-opacity="0.04"/>
  <!-- 虚线弧 -->
  <path d="M 300 200 Q 500 120 700 200" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="0.8" stroke-dasharray="6 8"/>
  <path d="M 300 210 Q 500 290 700 210" fill="none" stroke="#000000" stroke-opacity="0.03" stroke-width="0.6" stroke-dasharray="4 6"/>
  <!-- ====== 文字 ====== -->
  <!-- RV07 左上 -->
  <text x="30" y="130" 
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" 
        font-size="130" 
        font-weight="900" 
        fill="url(#rv07Grad)" 
        letter-spacing="4">
    RV07
  </text>
  <!-- CODE 右下 -->
  <text x="970" y="370" 
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" 
        font-size="130" 
        font-weight="900" 
        fill="url(#codeGrad)" 
        text-anchor="end" 
        letter-spacing="4">
    CODE
  </text>
</svg>
