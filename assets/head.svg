<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- RV07 黑色向右渐变透明 -->
    <linearGradient id="rv07Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- CODE 黑色向左渐变透明 -->
    <linearGradient id="codeGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- 几何装饰渐变 -->
    <linearGradient id="geoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="geoGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="geoGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- 点阵 pattern -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#000000" opacity="0.06"/>
    </pattern>
  </defs>
  <!-- ===== 几何装饰层 ===== -->
  <!-- 左上大三角 -->
  <polygon points="0,0 220,0 0,180" fill="url(#geoGrad1)"/>
  <!-- 左上小三角 -->
  <polygon points="0,0 110,0 0,90" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.10"/>
  <!-- 右下大三角 -->
  <polygon points="800,300 580,300 800,120" fill="url(#geoGrad2)"/>
  <!-- 右下小三角 -->
  <polygon points="800,300 690,300 800,210" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.10"/>
  <!-- 中央菱形 -->
  <polygon points="400,90 480,150 400,210 320,150" fill="none" stroke="#000000" stroke-width="0.8" opacity="0.07"/>
  <polygon points="400,110 460,150 400,190 340,150" fill="url(#geoGrad3)"/>
  <!-- 对角线 -->
  <line x1="0" y1="300" x2="800" y2="0" stroke="#000000" stroke-width="0.4" opacity="0.05"/>
  <line x1="0" y1="0" x2="800" y2="300" stroke="#000000" stroke-width="0.4" opacity="0.05"/>
  <!-- 水平辅助线 -->
  <line x1="60" y1="150" x2="320" y2="150" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="480" y1="150" x2="740" y2="150" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- 散落小几何 -->
  <!-- 左侧六边形 -->
  <polygon points="130,220 145,212 160,220 160,236 145,244 130,236" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.08"/>
  <!-- 右侧小正方形 -->
  <rect x="640" y="55" width="22" height="22" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.08" transform="rotate(15 651 66)"/>
  <!-- 左上圆环 -->
  <circle cx="200" cy="60" r="14" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.07"/>
  <circle cx="200" cy="60" r="6" fill="#000000" opacity="0.04"/>
  <!-- 右下圆环 -->
  <circle cx="600" cy="240" r="14" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.07"/>
  <circle cx="600" cy="240" r="6" fill="#000000" opacity="0.04"/>
  <!-- 点阵背景 -->
  <rect width="800" height="300" fill="url(#dots)"/>
  <!-- 微小十字标记 -->
  <g opacity="0.08" stroke="#000000" stroke-width="0.7">
    <line x1="395" y1="30" x2="405" y2="30"/>
    <line x1="400" y1="25" x2="400" y2="35"/>
    <line x1="395" y1="270" x2="405" y2="270"/>
    <line x1="400" y1="265" x2="400" y2="275"/>
  </g>
  <!-- 角落装饰弧线 -->
  <path d="M 0,60 Q 40,40 60,0" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <path d="M 800,240 Q 760,260 740,300" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- ===== 文字层 ===== -->
  <!-- RV07 左上 -->
  <text x="32" y="105" 
        font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" 
        font-size="82" 
        font-weight="900" 
        fill="url(#rv07Grad)" 
        letter-spacing="8">RV07</text>
  <!-- CODE 右下 -->
  <text x="768" y="260" 
        font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" 
        font-size="82" 
        font-weight="900" 
        fill="url(#codeGrad)" 
        text-anchor="end" 
        letter-spacing="8">CODE</text>
</svg>
