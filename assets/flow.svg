<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="RV07 CODE">
  <defs>
    <!-- 黑色主光晕：透明背景上形成黑曜石氛围 -->
    <radialGradient id="blackAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="38%" stop-color="#030712" stop-opacity="0.22"/>
      <stop offset="68%" stop-color="#111827" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- 少量冷白反光 -->
    <radialGradient id="whiteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="34%" stop-color="#E5E7EB" stop-opacity="0.11"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- 主体：黑色为主，两端透明，中间有玻璃高光 -->
    <linearGradient id="liquidMain" gradientUnits="userSpaceOnUse" x1="-120" y1="165" x2="1320" y2="265">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="8%" stop-color="#000000" stop-opacity="0.14"/>
      <stop offset="18%" stop-color="#030712" stop-opacity="0.56"/>
      <stop offset="32%" stop-color="#000000" stop-opacity="0.88"/>
      <stop offset="44%" stop-color="#111827" stop-opacity="0.72"/>
      <stop offset="52%" stop-color="#F9FAFB" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#030712" stop-opacity="0.82"/>
      <stop offset="74%" stop-color="#000000" stop-opacity="0.78"/>
      <stop offset="88%" stop-color="#111827" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
